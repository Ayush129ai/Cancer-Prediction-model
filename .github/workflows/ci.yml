name: ML Pipeline CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-train:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest
        
    - name: Ensure Models Directory
      run: mkdir -p models reports

    - name: Train model and check thresholds
      run: |
        # Training the model generates mlflow artifacts and checks metrics in stdout
        python src/model_training.py
        
    - name: Run Unit Tests
      run: |
        pytest tests/test_flask_ui.py
        
  build-docker:
    needs: test-and-train
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag breast-cancer-model:${{ github.sha }}
