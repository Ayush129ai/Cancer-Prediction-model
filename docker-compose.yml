version: '3.8'
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - BACKEND_URL=http://api:8000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
  web:
    image: python:3.14-slim
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "app/app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    environment:
      - BACKEND_URL=http://api:8000
